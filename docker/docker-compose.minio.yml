services:
  minio:
    image: minio/minio:latest
    container_name: collabreef-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: collabreef-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/collabreef --ignore-existing;
      mc anonymous set download myminio/collabreef;
      exit 0;
      "

  collabreef-nginx:
    build:
      context: ..
      dockerfile: Dockerfile
      target: nginx-runtime
    image: collabreef/collabreef-nginx:local
    container_name: collabreef-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - collabreef-api
      - collabreef-collab

  collabreef-collab:
    build:
      context: ..
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-collab
    command: ["node", "collab/src/index.js"]
    restart: unless-stopped
    volumes:
      - ../bin:/usr/local/app/bin
    environment:
      PORT: 3000
      DB_DRIVER: sqlite3
      DB_DSN: /usr/local/app/bin/collabreef.db
      APP_SECRET: ${APP_SECRET}
    depends_on:
      minio:
        condition: service_healthy

  collabreef-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-api
    command: ["./api"]
    restart: unless-stopped
    volumes:
      - ../bin:/usr/local/app/bin
    environment:
      STORAGE_TYPE: s3
      STORAGE_S3_ENDPOINT: minio:9000
      STORAGE_S3_ACCESS_KEY: minioadmin
      STORAGE_S3_SECRET_KEY: minioadmin
      STORAGE_S3_BUCKET: collabreef
      STORAGE_S3_USE_SSL: "false"
      PORT: 8080
      APP_DISABLE_SIGNUP: ${APP_DISABLE_SIGNUP}
      APP_SECRET: ${APP_SECRET}
    depends_on:
      minio:
        condition: service_healthy
      collabreef-collab:
        condition: service_started

volumes:
  minio_data:
    driver: local
