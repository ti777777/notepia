services:
  postgres:
    image: postgres:16-alpine
    container_name: collabreef-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabreef
      POSTGRES_USER: collabreef
      POSTGRES_PASSWORD: collabreef_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabreef"]
      interval: 10s
      timeout: 5s
      retries: 5

  collabreef-nginx:
    build:
      context: ..
      dockerfile: Dockerfile
      target: nginx-runtime
    image: collabreef/collabreef-nginx:local
    container_name: collabreef-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - collabreef-api
      - collabreef-collab

  collabreef-collab:
    build:
      context: ..
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-collab
    command: ["node", "collab/src/index.js"]
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_DRIVER: postgres
      DB_DSN: "host=postgres port=5432 user=collabreef password=collabreef_password dbname=collabreef sslmode=disable TimeZone=UTC"
      APP_SECRET: ${APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  collabreef-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: app-runtime
    image: collabreef/collabreef:local
    container_name: collabreef-api
    command: ["./api"]
    restart: unless-stopped
    environment:
      DB_DRIVER: postgres
      DB_DSN: "host=postgres port=5432 user=collabreef password=collabreef_password dbname=collabreef sslmode=disable TimeZone=UTC"
      DB_MIGRATIONS_PATH: "file://migrations/postgres"
      PORT: 8080
      APP_DISABLE_SIGNUP: ${APP_DISABLE_SIGNUP}
      APP_SECRET: ${APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      collabreef-collab:
        condition: service_started

volumes:
  postgres_data:
    driver: local
